{% extends "base.html" %}

{% block content %}

<main class="auth-page">

    <div class="auth-card">
        <h2>Sign in</h2>

        {% if error %}
<div class="auth-error">
    {{ error }}
</div>
{% endif %}

        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Sign in</button>
        </form>
        <div style="margin-top: 40px; text-align: center;">
    <p style="font-size: 14px; opacity: 0.7; margin-bottom: 12px;">
        Don’t have an account?
    </p>
    <a href="/signup"
       style="color: white; font-weight: 500; text-decoration: none; display: inline-block;">
        Create account
    </a>
</div>

    </div>

</main>

{% endblock %}
